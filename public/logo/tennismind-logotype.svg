<svg width="460" height="150" viewBox="0 0 460 150" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TennisMind logotype</title>
<desc>TennisMind wordmark in green serif with a clay tennis ball above and a tracked tagline below.</desc>
<circle cx="230" cy="30" r="14" fill="#C0512F"/>
<path d="M 216 30 C 224 18, 236 42, 244 30" fill="none" stroke="#F4ECDC" stroke-width="3" stroke-linecap="round"/>
<text x="230" y="92" text-anchor="middle" font-family="'Newsreader', Georgia, serif" font-size="50" font-weight="600" fill="#123A2A" letter-spacing="0.5">TennisMind</text>
<line x1="205" y1="106" x2="255" y2="106" stroke="#C0512F" stroke-width="2"/>
<text x="230" y="126" text-anchor="middle" font-family="'Inter', system-ui, Arial, sans-serif" font-size="12" fill="#7A7167" letter-spacing="4">TENNIS, READ CLOSELY</text>
</svg>
